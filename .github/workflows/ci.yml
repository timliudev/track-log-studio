name: CI

# Quality gate: type-check, unit tests and a production build on every push
# and PR targeting the long-lived branches. Cloudflare Pages handles the actual
# deploy separately (see docs/DESIGN.md §10).
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
