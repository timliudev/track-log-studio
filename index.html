<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PNG fallback for browsers/crawlers that don't support SVG favicons
         (generated from the same logo by scripts/generate-pwa-icons.mjs). -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Track Log Studio — multi-format track telemetry analysis: import ECU and GPS logger recordings, convert between formats, and analyse laps & telemetry. Fully client-side, installable as a PWA."
    />
    <!-- SEO: canonical + Open Graph / Twitter Card (B39). Domain is the
         confirmed production URL (docs/DESIGN.md) — there is no custom
         domain yet, so no workers.dev -> custom-domain redirect applies. -->
    <link rel="canonical" href="https://track-log-studio.timliudev.workers.dev/" />
    <meta property="og:title" content="Track Log Studio" />
    <meta
      property="og:description"
      content="Track Log Studio — multi-format track telemetry analysis: import ECU and GPS logger recordings, convert between formats, and analyse laps & telemetry. Fully client-side, installable as a PWA."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://track-log-studio.timliudev.workers.dev/" />
    <meta property="og:image" content="https://track-log-studio.timliudev.workers.dev/pwa-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Track Log Studio" />
    <meta
      name="twitter:description"
      content="Track Log Studio — multi-format track telemetry analysis: import ECU and GPS logger recordings, convert between formats, and analyse laps & telemetry. Fully client-side, installable as a PWA."
    />
    <meta name="twitter:image" content="https://track-log-studio.timliudev.workers.dev/pwa-512x512.png" />
    <!-- Static fallback for browsers that read HTML meta instead of the
         manifest's theme_color; kept in sync with src/theme/theme.css's
         --color-bg for :root (light) and [data-theme='dark']. Only reacts to
         OS-level prefers-color-scheme, not the in-app manual theme toggle
         (that needs a JS-driven update, out of scope for this static file). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f8fa" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1115" />
    <!-- iOS/Safari "Add to Home Screen" PWA metadata (Chrome/Android read the
         Web App Manifest instead; Safari still needs these explicitly). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Track Log Studio" />
    <!-- Real 180x180 PNG (opaque background, no source transparency — iOS
         doesn't honour it well) for reliable home-screen icon rendering.
         Generated by scripts/generate-pwa-icons.mjs. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Track Log Studio</title>
    <!-- Cloudflare Web Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "71723d0d6c604b239a596c8f5d65caa2"}'
    ></script>
    <!-- End Cloudflare Web Analytics -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
